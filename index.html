<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #camera-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #111; border: 2px solid #0f0; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; box-shadow: 0 0 20px #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }
        /* Efecto espejo para que sea más natural al usuario */
        #output_canvas { width: 100vw; height: 100vh; object-fit: cover; display: none; transform: scaleX(-1); }
        #info { position: absolute; top: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; font-size: 0.9rem; pointer-events: none; border: 1px solid #0f0; z-index: 10; text-align: center; min-width: 200px; }
        .warning { color: #ff4444; text-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body>

    <div id="camera-modal">
        <div class="modal-box">
            <h2 style="margin-top:0">ERGO-SENSING PRO</h2>
            <p>Análisis ergonómico en tiempo real.<br><br>Para celular, use <b>HTTPS</b>.</p>
            <button onclick="activarCamara()">INICIAR ANÁLISIS</button>
        </div>
    </div>

    <div id="info">ESTADO: ESPERANDO...</div>
    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="output_canvas"></canvas>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const info = document.getElementById('info');

// Función para calcular ángulos entre tres puntos
function calculateAngle(a, b, c) {
    const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let angle = Math.abs(radians * 180.0 / Math.PI);
    if (angle > 180.0) angle = 360 - angle;
    return angle;
}

async function activarCamara() {
    info.innerText = "SOLICITANDO PERMISOS...";
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        
        document.getElementById('camera-modal').style.display = 'none';
        canvasElement.style.display = 'block';
        videoElement.srcObject = stream;
        
        await videoElement.play();
        startAI();
    } catch (err) {
        console.error(err);
        alert("ERROR: " + err.message);
        info.innerText = "ERROR DE ACCESO";
    }
}

function startAI() {
    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    
    pose.setOptions({ 
        modelComplexity: 1, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5 
    });
    
    pose.onResults(results => {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        
        let statusText = "POSTURA: ANALIZANDO...";
        let drawColor = '#0f0';

        if (results.poseLandmarks) {
            const landmarks = results.poseLandmarks;
            
            // Puntos de interés: Oreja(7), Hombro(11), Cadera(23)
            const ear = landmarks[7];
            const shoulder = landmarks[11];
            const hip = landmarks[23];

            // Cálculo del ángulo del cuello/espalda
            const neckAngle = calculateAngle(ear, shoulder, hip);
            // Lógica Ergonómica: Si el ángulo es menor a 155°, está encorvado
            if (neckAngle < 155) {
                drawColor = '#f00';
                statusText = "<span class='warning'>¡ALERTA! CABEZA ADELANTADA</span>";
            } else {
                drawColor = '#0f0';
                statusText = "POSTURA: CORRECTA";
            }

            // Dibujar Conectores
            drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: drawColor, lineWidth: 4});
            // Dibujar Puntos (solo los principales para no saturar)
            drawLandmarks(canvasCtx, landmarks, {color: '#fff', lineWidth: 1, radius: 2});
        }
        
        info.innerHTML = statusText;
        canvasCtx.restore();
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); }
    });
    camera.start();
}
</script>
</body>
</html>
